<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - El-pro</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <h1>Daftar Akun</h1>
            <p>Buat akun baru untuk mulai belajar</p>

            <div class="alert alert-error" id="regError" style="display:none"></div>
            <div class="alert alert-success" id="regSuccess" style="display:none"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <label for="fullname">Nama Lengkap</label>
                <input id="fullname" name="fullname" type="text" placeholder="Nama lengkap Anda" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="email@domain.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Minimal 6 karakter" required minlength="6">

                <label for="confirm-password">Konfirmasi Password</label>
                <input id="confirm-password" name="confirm-password" type="password" placeholder="Ulangi password" required>

                <button type="submit" class="Login" id="btnRegister">Daftar</button>
            </form>

            <div class="extra">
                <p>Sudah punya akun? <a href="/auth/login.html">Masuk</a></p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>

    async function handleRegister(e) {
        e.preventDefault();
        const errorEl = document.getElementById('regError');
        const successEl = document.getElementById('regSuccess');
        const btn = document.getElementById('btnRegister');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        const fullname = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!fullname || !email || !password) {
            errorEl.textContent = 'Semua field wajib diisi';
            errorEl.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorEl.textContent = 'Password minimal 6 karakter';
            errorEl.style.display = 'block';
            return;
        }

        if (password !== confirmPassword) {
            errorEl.textContent = 'Password dan konfirmasi password tidak cocok';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Memproses...';

        try {
            const res = await fetch(API_BASE + '/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullname, email, password })
            });

            const data = await res.json();

            if (data.success) {
                successEl.textContent = data.message + ' Mengalihkan ke halaman login...';
                successEl.style.display = 'block';
                document.getElementById('registerForm').reset();

                setTimeout(() => {
                    window.location.href = '/auth/login.html';
                }, 2000);
            } else {
                errorEl.textContent = data.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Daftar';
            }
        } catch (err) {
            errorEl.textContent = 'Tidak dapat terhubung ke server. Pastikan server berjalan.';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Daftar';
        }
    }
    </script>
</body>
</html>
