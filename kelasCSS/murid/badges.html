<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/kelas.css">
    <title>Badge & Prestasi - El-pro</title>
    <style>
      .badge-page { padding: 30px 16px; font-family: "Space Grotesk", sans-serif; }
      .badge-page h3 { font-weight: 800; margin-bottom: 8px; color: #111; font-size: 2rem; }
      .badge-page .subtitle { color: #555; font-size: 1rem; font-weight: 600; margin-bottom: 28px; }

      .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
      .stat-card { background: #fff; border: 3px solid #111; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 4px 4px 0 #111; transition: transform 0.2s; }
      .stat-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #111; }
      .stat-card .stat-num { font-size: 2.2rem; font-weight: 900; color: #3b82f6; text-shadow: 2px 2px 0 #111; }
      .stat-card .stat-label { font-size: 0.85rem; color: #111; font-weight: 800; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

      .badges-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 16px; color: #111; text-transform: uppercase; border-bottom: 3px solid #111; padding-bottom: 8px; }
      .badges-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
      .badge-card { background: #fff; border: 3px solid #111; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 4px 4px 0 #111; transition: all 0.2s; position: relative; }
      .badge-card:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #111; }
      .badge-card.earned { background: #e0f2fe; }
      .badge-card.locked { background: #f5f5f5; border-color: #666; box-shadow: 4px 4px 0 #666; opacity: 0.8; }
      .badge-icon { display: flex; align-items: center; justify-content: center; width: 150px; height: 150px; margin: 0 auto 12px; border-radius: 12px; }
      .badge-icon img { max-width: 100%; max-height: 100%; width: auto; height: auto; text-align: center; }
      .badge-name { font-size: 1.1rem; font-weight: 800; color: #111; margin-bottom: 6px; }
      .badge-desc { font-size: 0.85rem; color: #444; font-weight: 600; margin-bottom: 12px; }
      .badge-status { display: inline-block; padding: 4px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; border: 2px solid #111; text-transform: uppercase; }
      .status-earned { background: #3b82f6; color: #fff; box-shadow: 2px 2px 0 #111; }
      .status-locked { background: #ddd; color: #555; }

      .progress-section { margin-bottom: 40px; }
      .progress-item { background: #fff; border: 3px solid #111; border-radius: 12px; padding: 18px; margin-bottom: 16px; box-shadow: 4px 4px 0 #111; }
      .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
      .progress-name { font-weight: 800; font-size: 0.95rem; color: #111; }
      .progress-pct { font-weight: 900; font-size: 0.95rem; color: #3b82f6; text-shadow: 1px 1px 0 #111; }
      .progress-bar-bg { height: 16px; background: #e5e5e5; border-radius: 8px; border: 2px solid #111; overflow: hidden; }
      .progress-bar-fill { height: 100%; border-right: 2px solid #111; background: #3b82f6; transition: width 0.5s; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-icons">
      <ul>
        <li><a href="/index.html"><img src="/assets/image/web icons/home2.svg" class="home-icon"></a></li>
        <li><a href="/murid/kelas.html"><img src="/assets/image/web icons/homeProfile.svg" class="homeProfile-icon"></a></li>
        <li><a href="/murid/bookmark.html"><img src="/assets/image/web icons/course.svg" class="course-icon"></a></li>
        <li><a href="/murid/quiz.html"><img src="/assets/image/web icons/bookmark.svg" class="bookmark-icon"></a></li>
        <li><a href="/murid/profile.html"><img src="/assets/image/web icons/profile.svg" class="user-profile"></a></li>
      </ul>
    </div>
</div>

<div class="container badge-page">
    <h3>Badge & Prestasi</h3>
    <p class="subtitle">Kumpulkan badge dengan menyelesaikan tantangan dan kuis!</p>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="totalPoin">0</div>
        <div class="stat-label">Total Poin ⭐</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="totalSelesai">0</div>
        <div class="stat-label">Tantangan Selesai</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="totalBadge">0</div>
        <div class="stat-label">Badge Diraih</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="totalStreak">0</div>
        <div class="stat-label">Hari Berturut</div>
      </div>
    </div>

    <!-- Badges -->
    <div class="badges-title">Koleksi Badge</div>
    <div class="badges-grid" id="badgesGrid"></div>

    <!-- Progress per Konsep -->
    <div class="badges-title">Progress Konsep</div>
    <div class="progress-section" id="progressSection"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
const badges = [
  { id: 'pemula', name: 'Pemula Coding', image: '../badge/icon_pemula_coding.png', desc: 'Selesaikan 1 tantangan pertama', minPoin: 5 },
  { id: 'penjelajah', name: 'Penjelajah Kode', image: '../badge/icon_penjelajah_kode.png', desc: 'Selesaikan 3 tantangan', minPoin: 30 },
  { id: 'logika', name: 'Ahli Logika', image: '../badge/icon_ahli_logika1.png', desc: 'Raih 50 poin dari tantangan', minPoin: 50 },
  { id: 'pantang', name: 'Pantang Menyerah', image: '../badge/icon_pantang_menyerah.png', desc: 'Raih 80 poin', minPoin: 80 },
  { id: 'coder', name: 'Coder Muda', image: '../badge/icon_coder_muda.png', desc: 'Raih 120 poin dari semua aktivitas', minPoin: 120 },
  { id: 'master', name: 'Master Logika', image: '../badge/icon_ahli_logika2.png', desc: 'Raih 200 poin — kamu yang terbaik!', minPoin: 200 },
  { id: 'quiz', name: 'Juara Kuis', image: '../badge/icon_juara_quiz.png', desc: 'Selesaikan kuis mini', minPoin: 100 },
  { id: 'legend', name: 'Legenda El-pro', image: '../badge/icon_legenda_elpro.png', desc: 'Raih 300+ poin dan selesaikan semua tantangan', minPoin: 300 }
];

const konsep = [
  { name: 'Sequence (Urutan)', challenges: [1, 3] },
  { name: 'Conditional (IF-ELSE)', challenges: [2, 4, 5, 10] },
  { name: 'Loop (Perulangan)', challenges: [5, 7, 9] },
  { name: 'Variabel & Tipe Data', challenges: [4, 6] },
  { name: 'Function (Fungsi)', challenges: [8] },
  { name: 'Array & List', challenges: [9] }
];

function renderBadges() {
  const token = localStorage.getItem('auth_token');
  const user = JSON.parse(localStorage.getItem('auth_user') || '{}');

  // Check user role - only murid can access badges
  if (user.role && user.role !== 'user') {
    showRoleError();
    return;
  }

  if (!token) {
    // Fallback ke localStorage jika tidak ada token
    renderBadgesOffline();
    return;
  }

  // Ambil data dari server
  fetch('http://localhost:5000/api/badges/get', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      renderBadgesFromServer(data);
    } else {
      // Jika error dari server (kemungkinan role bukan murid), tampilkan error
      if (data.message && data.message.includes('murid')) {
        showRoleError();
      } else {
        renderBadgesOffline();
      }
    }
  })
  .catch(err => {
    console.warn('Gagal mengambil data badge dari server:', err);
    renderBadgesOffline();
  });
}

function showRoleError() {
  document.getElementById('badgesGrid').innerHTML = `
    <div class="alert alert-warning text-center">
      <h4>⚠️ Akses Terbatas</h4>
      <p>Fitur badge dan poin hanya tersedia untuk murid.</p>
      <p>Silakan login sebagai murid untuk mengakses fitur ini.</p>
    </div>
  `;
  document.getElementById('totalPoin').textContent = '0';
  document.getElementById('totalBadge').textContent = '0';
  document.getElementById('totalSelesai').textContent = '0';
  document.getElementById('totalStreak').textContent = '0';
  document.getElementById('progressSection').innerHTML = '';
}

function renderBadgesOffline() {
  const poin = parseInt(localStorage.getItem('codekids_pts') || '0');
  let earned = 0;

  document.getElementById('totalPoin').textContent = poin;
  document.getElementById('totalStreak').textContent = localStorage.getItem('codekids_streak') || '1';

  // Count completed (simple: based on poin thresholds)
  let selesai = 0;
  if (poin >= 5) selesai = 1;
  if (poin >= 30) selesai = 3;
  if (poin >= 50) selesai = 5;
  if (poin >= 100) selesai = 7;
  if (poin >= 200) selesai = 10;
  document.getElementById('totalSelesai').textContent = selesai;

  const grid = document.getElementById('badgesGrid');
  grid.innerHTML = badges.map(b => {
    const isEarned = poin >= b.minPoin;
    if (isEarned) earned++;
    return `
      <div class="badge-card ${isEarned ? 'earned' : 'locked'}">
        <div class="badge-icon"><img src="${b.image}" alt="${b.name}"></div>
        <div class="badge-name">${b.name}</div>
        <div class="badge-desc">${b.desc}</div>
        <span class="badge-status ${isEarned ? 'status-earned' : 'status-locked'}">${isEarned ? 'Diraih!' : 'Terkunci'}</span>
      </div>
    `;
  }).join('');

  document.getElementById('totalBadge').textContent = earned;

  // Progress
  const user = JSON.parse(localStorage.getItem('auth_user') || '{}');
  const email = user.email || 'guest';
  const progressKey = 'quiz_progress_' + email;
  const completedLevels = JSON.parse(localStorage.getItem(progressKey) || '[]');

  document.getElementById('progressSection').innerHTML = konsep.map(k => {
    const completedCount = k.challenges.filter(id => completedLevels.includes(id) || completedLevels.includes(String(id))).length;
    const totalCount = k.challenges.length;
    const progress = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
    return `
      <div class="progress-item">
        <div class="progress-header">
          <span class="progress-name">${k.name}</span>
          <span class="progress-pct">${progress}%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width: ${progress}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

function renderBadgesFromServer(data) {
  const poin = data.points || 0;
  const badgesEarned = data.badges || [];
  const challengesCompleted = data.challenges_completed || 0;
  const streak = data.streak || 1;

  document.getElementById('totalPoin').textContent = poin;
  document.getElementById('totalBadge').textContent = badgesEarned.length;
  document.getElementById('totalSelesai').textContent = challengesCompleted;
  document.getElementById('totalStreak').textContent = streak;

  const grid = document.getElementById('badgesGrid');
  grid.innerHTML = badges.map(b => {
    const isEarned = badgesEarned.includes(b.id);
    return `
      <div class="badge-card ${isEarned ? 'earned' : 'locked'}">
        <div class="badge-icon"><img src="${b.image}" alt="${b.name}"></div>
        <div class="badge-name">${b.name}</div>
        <div class="badge-desc">${b.desc}</div>
        <span class="badge-status ${isEarned ? 'status-earned' : 'status-locked'}">${isEarned ? 'Diraih!' : 'Terkunci'}</span>
      </div>
    `;
  }).join('');

  // Progress dari server
  renderProgressFromServer(data.progress || []);
}

function renderProgressFromServer(progressData) {
  document.getElementById('progressSection').innerHTML = konsep.map(k => {
    const conceptProgress = progressData.find(p => p.name === k.name);
    const progress = conceptProgress ? conceptProgress.progress : 0;
    return `
      <div class="progress-item">
        <div class="progress-header">
          <span class="progress-name">${k.name}</span>
          <span class="progress-pct">${progress}%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width: ${progress}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

// Inisialisasi saat halaman dimuat
document.addEventListener('DOMContentLoaded', function() {
  renderBadges();
});

document.addEventListener('DOMContentLoaded', renderBadges);
</script>
</body>
</html>
