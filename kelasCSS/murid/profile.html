<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/kelas.css">
    <title>Profil - El-pro</title>
    <link rel="stylesheet" href="/css/login.css">
    <style>
        body {
            place-items: start center;
            padding: 30px 16px 30px 100px;
            background: #e8e8e8;
        }

        .profile-wrapper {
            width: min(520px, 94vw);
        }



        /* Profile card - neobrutalism */
        .profile-card {
            background: #fff;
            border: 3px solid #111;
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: 6px 6px 0 #111;
            margin-bottom: 20px;
        }
        .profile-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #111;
            padding-bottom: 10px;
            border-bottom: 2.5px solid #e5e5e5;
        }

        /* Avatar */
        .avatar-big {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #3b82f6;
            border: 3px solid #111;
            box-shadow: 4px 4px 0 #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; color: #fff;
            margin: 0 auto 14px;
        }
        .profile-name {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 4px;
        }
        .profile-email {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        .profile-role {
            text-align: center;
            margin-bottom: 10px;
        }
        .profile-role span {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 700;
            border: 2px solid #111;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .role-admin {
            background: #fef3c7;
            color: #92400e;
        }
        .role-guru {
            background: #dcfce7;
            color: #166534;
        }
        .role-user {
            background: #dbeafe;
            color: #1e40af;
        }

        /* Form inputs inside profile cards */
        .profile-card label {
            display: block;
            margin-bottom: 6px;
            color: #111;
            font-size: 0.84rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .profile-card input {
            width: 100%;
            background: #f5f5f5;
            border: 2.5px solid #111;
            color: #111;
            border-radius: 10px;
            padding: 0.78rem 0.9rem;
            margin-bottom: 1rem;
            outline: none;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 500;
            transition: all .2s ease;
        }
        .profile-card input:focus {
            border-color: #3b82f6;
            box-shadow: 3px 3px 0 #3b82f6;
            background: #fff;
        }
        .profile-card input::placeholder { color: #aaa; }

        /* Buttons */
        .btn-save {
            width: 100%;
            border: 2.5px solid #111;
            border-radius: 10px;
            background: #3b82f6;
            color: #fff;
            font-weight: 700;
            padding: 0.78rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            box-shadow: 4px 4px 0 #111;
            transition: all .15s ease;
        }
        .btn-save:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #111;
        }

        .btn-logout {
            width: 100%;
            border: 2.5px solid #111;
            border-radius: 10px;
            background: #fff;
            color: #111;
            font-weight: 700;
            padding: 0.78rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            box-shadow: 4px 4px 0 #111;
            margin-bottom: 12px;
            transition: all .15s ease;
        }
        .btn-logout:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #111;
        }

        .btn-danger {
            width: 100%;
            border: 2.5px solid #111;
            border-radius: 10px;
            background: #ef4444;
            color: #fff;
            font-weight: 700;
            padding: 0.78rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            box-shadow: 4px 4px 0 #111;
            transition: all .15s ease;
        }
        .btn-danger:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #111;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            place-items: center;
        }
        .modal-overlay.show { display: grid; }
        .modal-box {
            background: #fff;
            border: 3px solid #111;
            border-radius: 16px;
            padding: 2rem;
            width: min(400px, 90vw);
            box-shadow: 8px 8px 0 #111;
        }
        .modal-box h3 {
            color: #111;
            margin-bottom: 8px;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .modal-box p {
            color: #555;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }
        .modal-box input {
            width: 100%;
            background: #f5f5f5;
            border: 2.5px solid #111;
            color: #111;
            border-radius: 10px;
            padding: 0.78rem 0.9rem;
            margin-bottom: 1rem;
            outline: none;
            font-family: inherit;
            font-size: 0.92rem;
        }
        .modal-box input:focus {
            border-color: #3b82f6;
            box-shadow: 3px 3px 0 #3b82f6;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-icons">
            <ul>
                <li><a href="/index.html"><img src="/assets/image/web icons/home2.svg" class="home-icon"></a></li>
                <li><a href="/murid/kelas.html"><img src="/assets/image/web icons/homeProfile.svg" class="homeProfile-icon"></a></li>
                <li><a href="/murid/bookmark.html"><img src="/assets/image/web icons/course.svg" class="course-icon"></a></li>
                <li><a href="/murid/quiz.html"><img src="/assets/image/web icons/bookmark.svg" class="bookmark-icon"></a></li>
                <li><a href="/murid/absen.html"><img src="/assets/image/web icons/book.svg" class="absen-icon"></a></li>
                <li><a href="/murid/profile.html" class="active"><img src="/assets/image/web icons/profile.svg" class="user-profile"></a></li>
            </ul>
        </div>
    </div>



    <div class="profile-wrapper">
        <!-- Info Profil -->
        <div class="profile-card">
            <div class="avatar-big" id="avatarInitial">?</div>
            <div class="profile-name" id="profileName">Memuat...</div>
            <div class="profile-email" id="profileEmail">...</div>
            <div class="profile-role"><span id="profileRole" class="role-user">User</span></div>
        </div>

        <!-- Edit Profil -->
        <div class="profile-card">
            <h2>Edit Profil</h2>
            <div class="alert alert-error" id="editError" style="display:none"></div>
            <div class="alert alert-success" id="editSuccess" style="display:none"></div>
            <form onsubmit="handleUpdateProfile(event)">
                <label for="editName">Nama Lengkap</label>
                <input id="editName" type="text" placeholder="Nama lengkap" required>
                <label for="editEmail">Email</label>
                <input id="editEmail" type="email" placeholder="email@domain.com" required>
                <button type="submit" class="btn-save" id="btnUpdate">Simpan Perubahan</button>
            </form>
        </div>

        <!-- Ubah Password -->
        <div class="profile-card">
            <h2>Ubah Password</h2>
            <div class="alert alert-error" id="pwError" style="display:none"></div>
            <div class="alert alert-success" id="pwSuccess" style="display:none"></div>
            <form onsubmit="handleChangePassword(event)">
                <label for="oldPass">Password Lama</label>
                <input id="oldPass" type="password" placeholder="Masukkan password lama" required>
                <label for="newPass">Password Baru</label>
                <input id="newPass" type="password" placeholder="Minimal 6 karakter" required minlength="6">
                <button type="submit" class="btn-save" id="btnPw">Ubah Password</button>
            </form>
        </div>

        <!-- Aksi Akun -->
        <div class="profile-card">
            <h2>Akun</h2>
            <button class="btn-logout" onclick="doLogout()">Logout</button>
            <button class="btn-danger" onclick="showDeleteModal()">Hapus Akun</button>
        </div>
    </div>

    <!-- Modal Hapus Akun -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3>Hapus Akun</h3>
            <p>Akun kamu akan dihapus permanen. Masukkan password untuk konfirmasi.</p>
            <div class="alert alert-error" id="delError" style="display:none"></div>
            <input id="delPassword" type="password" placeholder="Password kamu">
            <div style="display:flex;gap:10px">
                <button class="btn-logout" onclick="hideDeleteModal()" style="flex:1;margin-bottom:0">Batal</button>
                <button class="btn-danger" onclick="handleDeleteAccount()" id="btnDel" style="flex:1">Hapus</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const user = await checkAuth();
        if (user) {
            document.getElementById('avatarInitial').textContent = user.fullname.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = user.fullname;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('editName').value = user.fullname;
            document.getElementById('editEmail').value = user.email;

            const role = user.role || 'user';
            const roleEl = document.getElementById('profileRole');
            if (role === 'admin') {
                roleEl.textContent = 'Administrator';
                roleEl.className = 'role-admin';
            } else if (role === 'guru') {
                roleEl.textContent = 'Guru / Dosen';
                roleEl.className = 'role-guru';
            } else {
                roleEl.textContent = 'Siswa';
                roleEl.className = 'role-user';
            }
        }
    });

    async function handleUpdateProfile(e) {
        e.preventDefault();
        const errEl = document.getElementById('editError');
        const sucEl = document.getElementById('editSuccess');
        errEl.style.display = 'none'; sucEl.style.display = 'none';

        const token = localStorage.getItem('auth_token');
        const fullname = document.getElementById('editName').value.trim();
        const email = document.getElementById('editEmail').value.trim();

        try {
            const res = await fetch(API_BASE + '/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, fullname, email })
            });
            const data = await res.json();
            if (data.success) {
                sucEl.textContent = data.message;
                sucEl.style.display = 'block';
                localStorage.setItem('auth_user', JSON.stringify(data.user));
                document.getElementById('profileName').textContent = fullname;
                document.getElementById('profileEmail').textContent = email;
                document.getElementById('avatarInitial').textContent = fullname.charAt(0).toUpperCase();
            } else {
                errEl.textContent = data.message; errEl.style.display = 'block';
            }
        } catch (err) {
            errEl.textContent = 'Gagal terhubung ke server'; errEl.style.display = 'block';
        }
    }

    async function handleChangePassword(e) {
        e.preventDefault();
        const errEl = document.getElementById('pwError');
        const sucEl = document.getElementById('pwSuccess');
        errEl.style.display = 'none'; sucEl.style.display = 'none';

        const token = localStorage.getItem('auth_token');
        const old_password = document.getElementById('oldPass').value;
        const new_password = document.getElementById('newPass').value;

        try {
            const res = await fetch(API_BASE + '/api/profile/password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, old_password, new_password })
            });
            const data = await res.json();
            if (data.success) {
                sucEl.textContent = data.message; sucEl.style.display = 'block';
                document.getElementById('oldPass').value = '';
                document.getElementById('newPass').value = '';
            } else {
                errEl.textContent = data.message; errEl.style.display = 'block';
            }
        } catch (err) {
            errEl.textContent = 'Gagal terhubung ke server'; errEl.style.display = 'block';
        }
    }

    function showDeleteModal() { document.getElementById('deleteModal').classList.add('show'); }
    function hideDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); document.getElementById('delError').style.display = 'none'; }

    async function handleDeleteAccount() {
        const errEl = document.getElementById('delError');
        errEl.style.display = 'none';
        const token = localStorage.getItem('auth_token');
        const password = document.getElementById('delPassword').value;

        if (!password) { errEl.textContent = 'Masukkan password'; errEl.style.display = 'block'; return; }

        try {
            const res = await fetch(API_BASE + '/api/profile/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('auth_user');
                alert('Akun berhasil dihapus.');
                window.location.href = '/auth/login.html';
            } else {
                errEl.textContent = data.message; errEl.style.display = 'block';
            }
        } catch (err) {
            errEl.textContent = 'Gagal terhubung ke server'; errEl.style.display = 'block';
        }
    }
    </script>
</body>
</html>
