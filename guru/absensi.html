<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/kelas.css">
    <title>Manajemen Absensi - El-pro</title>
    <style>
        .admin-page {
            padding: 30px 16px;
            font-family: "Space Grotesk", sans-serif;
            margin-left: 0;
            max-width: none;
        }

        .admin-page h3 {
            font-weight: 800;
            margin-bottom: 8px;
            color: #111;
            font-size: 2rem;
        }

        .admin-page .subtitle {
            color: #555;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 28px;
        }

        .admin-denied {
            text-align: center;
            padding: 60px 20px;
        }

        .admin-denied h4 {
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 1.8rem;
            color: #111;
        }

        .admin-card {
            background: #fff;
            border: 3px solid #111;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0 #111;
            transition: transform 0.2s;
        }

        .admin-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #111;
        }

        .table-custom {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 3px solid #111;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-custom th,
        .table-custom td {
            padding: 12px 16px;
            border-bottom: 2px solid #111;
            border-right: 2px solid #111;
            text-align: left;
        }

        .table-custom th:last-child,
        .table-custom td:last-child {
            border-right: none;
        }

        .table-custom tr:last-child td {
            border-bottom: none;
        }

        .table-custom thead {
            background: #facc15;
            font-weight: 800;
            text-transform: uppercase;
        }

        .table-custom tbody tr {
            background: #fff;
        }

        .table-custom tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 2px solid #111;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-hadir {
            background: #00e676;
            color: #111;
        }

        .status-izin {
            background: #ffea00;
            color: #111;
        }

        .status-sakit {
            background: #ff4081;
            color: #fff;
        }

        /* Sidebar fixes for guru pages */
        .sidebar {
            height: 100vh;
            width: 80px;
            position: fixed;
            top: 0;
            left: 0;
            background: #ffffff;
            border-right: 3px solid #111;
            z-index: 1000;
            box-shadow: none;
        }

        .sidebar-icons {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .sidebar-icons ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-icons li {
            margin-bottom: 25px;
        }

        .sidebar-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: transparent;
        }

        .sidebar-icons a:hover {
            background-color: #ffea00;
            border-color: #111;
            box-shadow: 4px 4px 0 #111;
            transform: translate(-3px, -3px);
        }

        .sidebar-icons a.active {
            background-color: #3d5afe;
            border-color: #111;
            box-shadow: 4px 4px 0 #111;
            transform: translate(-2px, -2px);
        }

        .sidebar-icons img {
            width: 26px;
            height: 26px;
            filter: none;
            transition: all 0.2s;
        }

        .sidebar-icons a.active img {
            filter: brightness(0) invert(1);
        }

        /* Container adjustment for guru pages */
        .container.admin-page {
            margin-left: 100px;
            padding: 40px;
            max-width: calc(100vw - 100px);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .container.admin-page {
                margin-left: 60px;
                max-width: calc(100vw - 60px);
                padding: 20px;
            }
            .sidebar-icons img {
                width: 20px;
                height: 20px;
            }
            .sidebar-icons a {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-icons">
            <ul>
                <li><a href="index.html"><img src="/assets/image/web icons/home2.svg" class="home-icon"></a></li>
                <li><a href="/guru/kelas.html"><img src="/assets/image/web icons/homeProfile.svg" class="homeProfile-icon"></a></li>
                <li><a href="/guru/manajemen-tantangan.html"><img src="/assets/image/web icons/course.svg" class="course-icon"></a></li>
                <li><a href="/guru/absensi.html" class="active"><img src="/assets/image/web icons/book.svg" class="absen-icon"></a></li>
                <li><a href="/guru/profile.html"><img src="/assets/image/web icons/profile.svg" class="user-profile"></a></li>
            </ul>
        </div>
    </div>

    <div class="container admin-page" id="adminContent" style="display:none">
        <h3>Manajemen Absensi</h3>
        <p class="subtitle">Pantau kehadiran murid hari ini</p>

        <div class="admin-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h5 style="font-weight: 800; font-size: 1.2rem; margin: 0;">Data Kehadiran - <span id="currentDate">Hari
                        ini</span></h5>
                <button class="btn btn-sm btn-primary" style="font-weight: 700; border: 2px solid #111;"
                    onclick="loadAbsensiData()">Refresh Data</button>
            </div>

            <div style="overflow-x: auto;">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th>Nama Murid</th>
                            <th>Status Kehadiran</th>
                            <th>Catatan / Alasan</th>
                            <th>Waktu Absen</th>
                        </tr>
                    </thead>
                    <tbody id="absensiTableBody">
                        <!-- Data will be populated here -->
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 20px;">Memuat data absensi...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Access denied -->
    <div class="container admin-page admin-denied" id="adminDenied" style="display:none">
        <h4>Akses Ditolak</h4>
        <p>Halaman ini hanya bisa diakses oleh Guru dan Administrator.</p>
        <a href="/index.html" class="btn btn-primary"
            style="border: 3px solid #111; font-weight: bold; margin-top: 15px;">Kembali ke Beranda</a>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // ═══ AUTH CHECK — Admin & Guru ═══
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (!user) return;

            if (user.role === 'admin' || user.role === 'guru') {
                document.getElementById('adminContent').style.display = 'block';

                // Set current date
                const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', dateOpts);

                // Load mock data for now
                loadAbsensiData();
            } else {
                document.getElementById('adminDenied').style.display = 'block';
            }
        });

        async function loadAbsensiData() {
            const tbody = document.getElementById('absensiTableBody');
            const token = localStorage.getItem('auth_token');

            if (!token) return;

            try {
                const res = await fetch(API_BASE + '/api/absensi/today', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const data = await res.json();

                if (data.success) {
                    if (data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Belum ada data absensi hari ini.</td></tr>';
                        return;
                    }

                    tbody.innerHTML = data.data.map(item => {
                        let statusClass = 'status-hadir';
                        if (item.status === 'Izin') statusClass = 'status-izin';
                        if (item.status === 'Sakit') statusClass = 'status-sakit';

                        return `
                    <tr>
                        <td style="font-weight: 600;">${item.name}</td>
                        <td><span class="badge-status ${statusClass}">${item.status}</span></td>
                        <td style="color: #555; font-size: 0.9rem;">${item.notes || '-'}</td>
                        <td style="font-size: 0.9rem;">${item.time}</td>
                    </tr>
                `;
                    }).join('');
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">Gagal: ${data.message}</td></tr>`;
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">Gagal mengambil data dari server.</td></tr>`;
            }
        }
    </script>
</body>

</html>
